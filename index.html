<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Present Tense Interactive Worksheet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #f3e8ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .option-btn {
            transition: all 0.2s ease;
            border: 2px solid #e9d5ff;
        }
        .option-btn:hover {
            background-color: #f5f3ff;
            border-color: #a855f7;
        }
        .option-btn.selected {
            background-color: #a855f7;
            color: white;
            border-color: #7e22ce;
        }
        .feedback-box {
            display: none;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <!-- Header Section -->
        <header class="text-center mb-8 relative">
            <div class="absolute -top-4 -left-4 text-yellow-400 opacity-50 transform -rotate-12">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .587l3.668 7.568 8.332 1.151-6.064 5.828 1.48 8.279-7.416-3.967-7.417 3.967 1.481-8.279-6.064-5.828 8.332-1.151z"/></svg>
            </div>
            <h1 class="text-4xl md:text-5xl font-black text-gray-800 mb-2">Simple Present Tense</h1>
            <p class="text-xl text-purple-600 font-bold uppercase tracking-widest">Interactive Worksheet</p>
            <div class="absolute -bottom-4 -right-4 text-purple-400 opacity-50 transform rotate-12">
                <i class="fas fa-motorcycle fa-3x"></i>
            </div>
        </header>

        <!-- Student Info -->
        <div class="card p-6 mb-8 grid grid-cols-1 md:grid-cols-3 gap-4 border-b-8 border-yellow-300">
            <div>
                <label class="block text-sm font-bold text-gray-600 mb-1">Name:</label>
                <input type="text" class="w-full border-b-2 border-purple-200 focus:border-purple-500 outline-none p-1" placeholder="Enter name...">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-600 mb-1">Class:</label>
                <input type="text" class="w-full border-b-2 border-purple-200 focus:border-purple-500 outline-none p-1" placeholder="Enter class...">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-600 mb-1">Date:</label>
                <input type="date" class="w-full border-b-2 border-purple-200 focus:border-purple-500 outline-none p-1">
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Affirmative Column -->
            <div class="space-y-6">
                <div class="bg-yellow-400 p-4 rounded-t-2xl text-center font-black text-2xl uppercase shadow-sm">
                    <i class="fas fa-plus-circle mr-2"></i> Affirmative
                </div>
                <div id="affirmative-questions" class="space-y-4">
                    <!-- JS will inject questions here -->
                </div>
            </div>

            <!-- Negative Column -->
            <div class="space-y-6">
                <div class="bg-purple-600 p-4 rounded-t-2xl text-center font-black text-2xl text-white uppercase shadow-sm">
                    <i class="fas fa-minus-circle mr-2"></i> Negative
                </div>
                <div id="negative-questions" class="space-y-4">
                    <!-- JS will inject questions here -->
                </div>
            </div>
        </div>

        <!-- Footer / Score -->
        <div class="mt-12 card p-8 text-center border-t-8 border-green-400">
            <h2 class="text-2xl font-bold mb-4">Worksheet Progress</h2>
            <div class="w-full bg-gray-200 rounded-full h-6 mb-4">
                <div id="progress-bar" class="bg-green-500 h-6 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
            <p id="score-text" class="text-xl font-bold text-gray-700">Answer all questions to see your final score!</p>
            <button onclick="window.location.reload()" class="mt-4 bg-gray-800 text-white px-6 py-2 rounded-full font-bold hover:bg-gray-700 transition">Reset Worksheet</button>
        </div>
    </div>

    <script>
        const questions = [
            // Affirmative
            { id: 1, type: 'affirmative', text: 'Ali and Abu ___ to play football every evening.', options: ['like', 'likes'], correct: 'like', feedback: 'Since "Ali and Abu" is plural (They), we use the base form of the verb.' },
            { id: 2, type: 'affirmative', text: 'She ___ to cook her own breakfast.', options: ['love', 'loves'], correct: 'loves', feedback: 'With singular subjects like "She", we add "-s" to the verb.' },
            { id: 3, type: 'affirmative', text: 'Michael and Marcus ___ video games together.', options: ['play', 'plays'], correct: 'play', feedback: 'Compound subjects (A and B) are plural, so use the base verb.' },
            { id: 4, type: 'affirmative', text: 'We ___ at the restaurant every Sunday.', options: ['eat', 'eats'], correct: 'eat', feedback: 'The pronoun "We" is plural, so we do not add "-s".' },
            { id: 5, type: 'affirmative', text: 'I ___ breakfast at 5.30 a.m.', options: ['has', 'have'], correct: 'have', feedback: 'The pronoun "I" always takes "have" in the present tense.' },
            { id: 6, type: 'affirmative', text: 'Mr. Fernandez ___ the school bus everyday.', options: ['drive', 'drives'], correct: 'drives', feedback: 'Mr. Fernandez is a singular subject (He), so add "-s".' },
            { id: 7, type: 'affirmative', text: 'It ___ a nice color on its fur.', options: ['has', 'have'], correct: 'has', feedback: 'The singular pronoun "It" takes "has".' },
            { id: 8, type: 'affirmative', text: 'Alicia ___ up at 7 a.m. everyday except Sunday.', options: ['get', 'gets'], correct: 'gets', feedback: 'Alicia is singular (She), so add "-s" to the verb.' },
            { id: 9, type: 'affirmative', text: 'Ah Hong ___ his hair at his mother\'s salon.', options: ['cut', 'cuts'], correct: 'cuts', feedback: 'Ah Hong is singular (He), so add "-s" to the verb.' },
            { id: 10, type: 'affirmative', text: 'Madam Mae ___ her wonton noodles every weekend.', options: ['sell', 'sells'], correct: 'sells', feedback: 'Madam Mae is singular (She), so add "-s" to the verb.' },
            
            // Negative
            { id: 11, type: 'negative', text: 'He ___ like to wake up early.', options: ["don't", "doesn't"], correct: "doesn't", feedback: 'For singular "He/She/It", use "doesn\'t".' },
            { id: 12, type: 'negative', text: 'They ___ go to school if it is raining.', options: ["don't", "doesn't"], correct: "don't", feedback: 'For plural "They", use "don\'t".' },
            { id: 13, type: 'negative', text: 'You ___ like to exercise?', options: ["don't", "doesn't"], correct: "don't", feedback: 'The pronoun "You" always uses "don\'t".' },
            { id: 14, type: 'negative', text: 'Devi ___ watch TV during weekdays.', options: ["don't", "doesn't"], correct: "doesn't", feedback: 'Devi is singular (She), so use "doesn\'t".' },
            { id: 15, type: 'negative', text: 'Ricardo ___ play video games during weekdays.', options: ["don't", "doesn't"], correct: "doesn't", feedback: 'Ricardo is singular (He), so use "doesn\'t".' },
            { id: 16, type: 'negative', text: 'Mrs. Valerie ___ teach Science.', options: ["don't", "doesn't"], correct: "doesn't", feedback: 'Mrs. Valerie is singular (She), so use "doesn\'t".' },
            { id: 17, type: 'negative', text: 'We ___ eat at that restaurant because it is expensive.', options: ["don't", "doesn't"], correct: "don't", feedback: 'For plural "We", use "don\'t".' },
            { id: 18, type: 'negative', text: 'They ___ go to school at 8 a.m. during Monday.', options: ["don't", "doesn't"], correct: "don't", feedback: 'For plural "They", use "don\'t".' },
            { id: 19, type: 'negative', text: 'Ana ___ read books during her free time.', options: ["don't", "doesn't"], correct: "doesn't", feedback: 'Ana is singular (She), so use "doesn\'t".' },
            { id: 20, type: 'negative', text: 'My dog ___ bark at strangers.', options: ["don't", "doesn't"], correct: "doesn't", feedback: 'My dog is singular (It), so use "doesn\'t".' }
        ];

        let userAnswers = {};

        function initWorksheet() {
            const affContainer = document.getElementById('affirmative-questions');
            const negContainer = document.getElementById('negative-questions');

            questions.forEach(q => {
                const qDiv = document.createElement('div');
                qDiv.className = 'card p-4 border-l-4 ' + (q.type === 'affirmative' ? 'border-yellow-400' : 'border-purple-600');
                
                const questionText = q.text.replace('___', '<span id="blank-' + q.id + '" class="font-bold text-purple-600 border-b-2 border-dotted border-purple-400 px-2 min-w-[60px] inline-block text-center">_____</span>');
                
                qDiv.innerHTML = `
                    <div class="flex items-start gap-3">
                        <div class="bg-gray-100 rounded-full w-8 h-8 flex items-center justify-center font-bold text-sm flex-shrink-0">${q.id}</div>
                        <div class="flex-grow">
                            <p class="text-lg text-gray-800 mb-3 leading-relaxed">${questionText}</p>
                            <div class="flex flex-wrap gap-2 mb-2">
                                ${q.options.map(opt => `
                                    <button onclick="selectOption(${q.id}, '${opt}')" 
                                            id="btn-${q.id}-${opt}" 
                                            class="option-btn px-4 py-1 rounded-lg font-medium text-sm">
                                        ${opt}
                                    </button>
                                `).join('')}
                            </div>
                            <div id="feedback-${q.id}" class="feedback-box text-sm p-2 rounded-lg mt-2"></div>
                        </div>
                    </div>
                `;

                if (q.type === 'affirmative') {
                    affContainer.appendChild(qDiv);
                } else {
                    negContainer.appendChild(qDiv);
                }
            });
        }

        window.selectOption = (questionId, option) => {
            const q = questions.find(item => item.id === questionId);
            const feedbackDiv = document.getElementById(`feedback-${questionId}`);
            const blankSpan = document.getElementById(`blank-${questionId}`);
            
            // Clear previous selections for this question
            q.options.forEach(opt => {
                document.getElementById(`btn-${questionId}-${opt}`).classList.remove('selected');
            });
            
            // Highlight current
            document.getElementById(`btn-${questionId}-${option}`).classList.add('selected');
            
            // Update UI
            blankSpan.textContent = option;
            userAnswers[questionId] = option;
            
            // Show Feedback
            feedbackDiv.style.display = 'block';
            if (option === q.correct) {
                feedbackDiv.className = 'feedback-box text-sm p-3 rounded-lg mt-2 bg-green-100 text-green-800 border border-green-200';
                feedbackDiv.innerHTML = `<i class="fas fa-check-circle mr-2"></i> <strong>Correct!</strong> ${q.feedback}`;
                blankSpan.className = "font-bold text-green-600 border-b-2 border-green-400 px-2 min-w-[60px] inline-block text-center";
            } else {
                feedbackDiv.className = 'feedback-box text-sm p-3 rounded-lg mt-2 bg-red-100 text-red-800 border border-red-200';
                feedbackDiv.innerHTML = `<i class="fas fa-times-circle mr-2"></i> <strong>Try again!</strong> ${q.feedback}`;
                blankSpan.className = "font-bold text-red-600 border-b-2 border-red-400 px-2 min-w-[60px] inline-block text-center";
            }
            
            updateProgress();
        };

        function updateProgress() {
            const answeredCount = Object.keys(userAnswers).length;
            const totalCount = questions.length;
            const progress = (answeredCount / totalCount) * 100;
            
            document.getElementById('progress-bar').style.width = `${progress}%`;
            
            if (answeredCount === totalCount) {
                let correctCount = 0;
                questions.forEach(q => {
                    if (userAnswers[q.id] === q.correct) correctCount++;
                });
                
                const scoreText = document.getElementById('score-text');
                const percentage = Math.round((correctCount / totalCount) * 100);
                
                let message = "";
                if (percentage === 100) message = "Perfect! You are a grammar master! 🌟";
                else if (percentage >= 80) message = "Great job! Almost perfect! 👍";
                else if (percentage >= 50) message = "Good effort! Keep practicing! 📚";
                else message = "Keep studying! You can do it! 💪";
                
                scoreText.innerHTML = `Final Score: <span class="text-3xl text-purple-600">${correctCount} / ${totalCount}</span> (${percentage}%)<br><span class="text-lg font-normal">${message}</span>`;
            } else {
                document.getElementById('score-text').textContent = `Answered ${answeredCount} of ${totalCount} questions.`;
            }
        }

        window.onload = initWorksheet;
    </script>
</body>
</html>
